version: '3.8'

services:
  db:
    image: mysql:8
    container_name: gymgate_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gymgate_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gymgate}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
